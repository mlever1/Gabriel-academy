<script>
  // Load-failure detector — React and ReactDOM are now inlined.
  // The only external dependency is Tailwind CSS. Detect if it didn't load.
  window.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      var root = document.getElementById('root');
      if (!root) return;
      // React/ReactDOM should always be present (inlined). If they're not, big problem.
      if (!window.React || !window.ReactDOM) {
        root.innerHTML = '<div style="padding:20px;font-family:system-ui;background:#FFF8EE;min-height:100vh;color:#0F172A">' +
          '<h1 style="font-weight:900;font-size:24px">Critical script error</h1>' +
          '<p style="margin:12px 0">Even the inlined React did not run. JS execution is blocked.</p>' +
          '<p>UA: ' + navigator.userAgent.substring(0, 200) + '</p></div>';
        return;
      }
      // Detect if Tailwind loaded by testing whether a known utility class actually applies.
      var probe = document.createElement('div');
      probe.className = 'fixed';
      probe.style.cssText = 'position:static'; // baseline
      document.body.appendChild(probe);
      var hasTailwind = window.getComputedStyle(probe).position === 'fixed' || (window.tailwind != null);
      document.body.removeChild(probe);
      if (!hasTailwind) {
        // App will look unstyled. Show a banner but don't replace content.
        var banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#FEE2E2;color:#0F172A;padding:10px;font-family:system-ui;font-size:14px;text-align:center;z-index:9999;border-bottom:3px solid #0F172A';
        banner.textContent = 'Styles did not load — open in Safari directly (not from chat) for the best experience.';
        document.body.insertBefore(banner, document.body.firstChild);
      } else if (root.innerHTML.length === 0) {
        // React loaded, Tailwind loaded, but render didn't happen. Wait then diagnose.
        setTimeout(function() {
          if (root.innerHTML.length === 0) {
            root.innerHTML = '<div style="padding:20px;font-family:system-ui;background:#FFF8EE;min-height:100vh;color:#0F172A">' +
              '<h1 style="font-weight:900;font-size:24px">Render did not happen</h1>' +
              '<p style="margin:12px 0">Show this to Dad. The app loaded but did not draw.</p>' +
              '<p>UA: ' + navigator.userAgent.substring(0, 200) + '</p></div>';
          }
        }, 3000);
      }
    }, 2000);
  });
</script>
<style>
  html, body { background: #FFF8EE; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
  input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; height: 32px; }
  input[type="range"]::-webkit-slider-runnable-track { height: 12px; background: #fff; border: 3px solid #0F172A; border-radius: 99px; }
  input[type="range"]::-moz-range-track { height: 12px; background: #fff; border: 3px solid #0F172A; border-radius: 99px; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; background: #3B82F6; border: 3px solid #0F172A; border-radius: 50%; cursor: pointer; margin-top: -11px; box-shadow: 2px 2px 0 #0F172A; }
  input[type="range"]::-moz-range-thumb { width: 28px; height: 28px; background: #3B82F6; border: 3px solid #0F172A; border-radius: 50%; cursor: pointer; box-shadow: 2px 2px 0 #0F172A; }
  .no-select { -webkit-user-select: none; user-select: none; }
  @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  .pop { animation: pop 0.3s ease-out; }
